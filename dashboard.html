<style>

    --paper: #f4f1ea;
    --paper-dark: #ebe6d8;
    --ink: #161513;
    --ink-soft: #3a3631;
    --ink-faded: #6b6357;
    --rule: #d4cdb8;
    --accent: #8b2a1f;
    --accent-dark: #5a1a13;
    --gold: #a47c2c;
    --good: #2d5a3f;
    --warn: #8b6914;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 42, 31, 0.02) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(164, 124, 44, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    position: relative;
    z-index: 1;
  }

  /* ----- MASTHEAD ----- */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 32px 0 20px;
    margin-bottom: 24px;
    position: relative;
  }

  .masthead-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faded);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }

  .masthead-meta span:first-child::before {
    content: "◆ ";
    color: var(--accent);
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(48px, 7vw, 84px);
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-align: center;
    font-variation-settings: "opsz" 144;
  }

  .masthead h1 .the {
    display: block;
    font-size: 0.3em;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    color: var(--ink-soft);
  }

  .masthead .subtitle {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    margin-top: 12px;
    color: var(--ink-soft);
  }

  .masthead .subtitle::before,
  .masthead .subtitle::after {
    content: "  ·  ";
    color: var(--accent);
  }

  /* ----- STATS STRIP ----- */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--ink);
    background: var(--paper);
    margin-bottom: 32px;
  }

  .stat {
    padding: 16px 20px;
    border-right: 1px solid var(--rule);
    position: relative;
  }
  .stat:last-child { border-right: none; }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stat-value .unit {
    font-size: 14px;
    color: var(--ink-faded);
    font-weight: 400;
    margin-left: 4px;
  }

  /* ----- CONTROLS ----- */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
    margin-bottom: 32px;
    padding: 16px;
    background: var(--paper-dark);
    border: 1px solid var(--rule);
  }

  .search-wrap { position: relative; }

  .search {
    width: 100%;
    padding: 10px 14px 10px 36px;
    background: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--ink-faded); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faded);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
  }

  .filter-group {
    display: flex;
    gap: 4px;
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 2px;
  }

  .filter-btn {
    padding: 8px 14px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--ink); }

  .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  .sort-select {
    padding: 9px 12px;
    background: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }

  /* ----- ARTICLE GRID ----- */
  .articles {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 0;
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
  }

  .article {
    padding: 24px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    transition: background 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 240px;
  }

  .article:hover {
    background: var(--paper-dark);
  }

  .article::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 0;
    background: var(--accent);
    transition: height 0.25s ease;
  }

  .article:hover::before { height: 100%; }

  .article-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px dotted var(--rule);
  }

  .source-name {
    color: var(--accent);
    font-weight: 500;
  }

  .article-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.2;
    letter-spacing: -0.015em;
    margin-bottom: 12px;
    font-variation-settings: "opsz" 36;
  }

  .article-title a {
    color: var(--ink);
    text-decoration: none;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-size: 0% 1px;
    background-position: 0 100%;
    background-repeat: no-repeat;
    transition: background-size 0.25s;
  }

  .article-title a:hover {
    background-size: 100% 1px;
    color: var(--accent);
  }

  .article-summary {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-bottom: 16px;
    flex-grow: 1;
  }

  .article-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px dotted var(--rule);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 6px;
    background: var(--paper-dark);
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }

  .score-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    background: var(--ink);
    color: var(--paper);
    letter-spacing: 0.05em;
  }

  .score-badge.high { background: var(--accent); }
  .score-badge.med { background: var(--gold); }

  /* ----- EMPTY / FOOTER ----- */
  .empty {
    grid-column: 1 / -1;
    padding: 80px 20px;
    text-align: center;
    color: var(--ink-faded);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
  }

  .colophon {
    margin-top: 48px;
    padding: 24px 0;
    border-top: 3px double var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faded);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .colophon a { color: var(--accent); text-decoration: none; }
  .colophon a:hover { text-decoration: underline; }

  /* Feed status drawer */

    margin-top: 16px;
    padding: 16px;
    background: var(--paper-dark);
    border: 1px solid var(--rule);
    display: none;
  }
  .feed-status.open { display: block; }

  .feed-status h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .feed-status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .feed-status-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
  }
  .feed-status-row .ok { color: var(--good); }
  .feed-status-row .err { color: var(--accent); }

  @media (max-width: 768px) {
    .container { padding: 0 16px; }
    .stats-strip { grid-template-columns: repeat(2, 1fr); }
    .stat:nth-child(2) { border-right: none; }
    .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid var(--rule); }
    .controls { grid-template-columns: 1fr; }
    .articles { grid-template-columns: 1fr; }
  }
</style>
</head>

</script>
<script>
let DATA = null;
let activeFilter = 'all';
let activeSort = 'rank';
let searchTerm = '';

const FILTER_KEYWORDS = {
  retail: ['retail', 'shopping center', 'tenant', 'lease', 'restaurant', 'grocery', 'wawa', 'sheetz', 'aldi', 'dollar general', 'starbucks', 'chipotle', 'anchor tenant', 'strip mall', 'big box', 'jersey mike', 'opening'],
  zoning: ['zoning', 'rezoning', 'planning commission', 'site plan', 'subdivision plan', 'township', 'borough', 'variance', 'land development plan'],
  industrial: ['industrial', 'warehouse', 'distribution center', 'logistics', 'industrial park', 'fedex', 'amazon'],
  medical: ['medical office', 'medical office building', 'healthcare', 'hospital'],
};

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / (1000 * 60 * 60 * 24);
  if (diff < 1) return 'TODAY';
  if (diff < 2) return 'YESTERDAY';
  if (diff < 7) return Math.floor(diff) + 'D AGO';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
}

function matchesFilter(article, filter) {
  if (filter === 'all') return true;
  const keywords = FILTER_KEYWORDS[filter] || [];
  const text = (article.title + ' ' + article.summary + ' ' + (article.matched_terms || []).join(' ')).toLowerCase();
  return keywords.some(k => text.includes(k));
}

function matchesSearch(article, term) {
  if (!term) return true;
  const t = term.toLowerCase();
  return (article.title + ' ' + article.summary + ' ' + article.source).toLowerCase().includes(t);
}

function scoreBadgeClass(score) {
  if (score >= 14) return 'high';
  if (score >= 9) return 'med';
  return '';
}

function render() {
  const list = DATA.articles
    .filter(a => matchesFilter(a, activeFilter))
    .filter(a => matchesSearch(a, searchTerm));

  if (activeSort === 'date') {
    list.sort((a, b) => (b.published_ts || 0) - (a.published_ts || 0));
  } else if (activeSort === 'score') {
    list.sort((a, b) => b.topic_score - a.topic_score);
  } else {
    list.sort((a, b) => b.rank_score - a.rank_score);
  }

  const container = document.getElementById('articles');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">No articles match the current filter.</div>';
    return;
  }

  container.innerHTML = list.map(a => `
    <article class="article">
      <div class="article-meta">
        <span class="source-name">${escapeHtml(a.source)}</span>
        <span>${fmtDate(a.published)}</span>
      </div>
      <h2 class="article-title">
        <a href="${escapeHtml(a.link)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a>
      </h2>
      <p class="article-summary">${escapeHtml(a.summary || '')}</p>
      <div class="article-footer">
        <div class="tags">
          ${(a.matched_terms || []).slice(0, 4).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
        </div>
        <span class="score-badge ${scoreBadgeClass(a.topic_score)}">★ ${a.topic_score}</span>
      </div>
    </article>
  `).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStats() {
  document.getElementById('stat-count').innerHTML = DATA.articles.length;
  document.getElementById('stat-high').innerHTML = DATA.articles.filter(a => a.topic_score >= 14).length;

  const now = Date.now() / 1000;
  const recent = DATA.articles.filter(a => a.published_ts && (now - a.published_ts) < 7 * 86400).length;
  document.getElementById('stat-recent').innerHTML = recent;

  const okSources = DATA.feed_status.filter(s => !s.error).length;
  const totalSources = DATA.feed_status.length;
  document.getElementById('stat-sources').innerHTML = `${okSources}<span class="unit">/${totalSources}</span>`;

  const date = new Date(DATA.generated_at);
  const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
  document.getElementById('dateline').textContent = `VOL. I · No. 1 · ${dateStr}`;
  document.getElementById('generated-at').textContent = `PUBLISHED ${date.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }).toUpperCase()}`;

  // Feed status drawer
  document.getElementById('feed-status-grid').innerHTML = DATA.feed_status.map(s => `
    <div class="feed-status-row">
      <span>${escapeHtml(s.source.slice(0, 32))}${s.source.length > 32 ? '…' : ''}</span>
      <span class="${s.error ? 'err' : 'ok'}">${s.error ? '✗ ' + s.error : '✓ ' + s.count}</span>
    </div>
  `).join('');
}

function loadData() {
  try {
    const el = document.getElementById('embedded-data');
    if (el) {
      DATA = JSON.parse(el.textContent);
      renderStats();
      render();
      return;
    }
    // Fallback: try to fetch articles.json (works if served via http)
    fetch('articles.json').then(r => r.json()).then(d => {
      DATA = d;
      renderStats();
      render();
    }).catch(() => {
      document.getElementById('articles').innerHTML =
        '<div class="empty">No data available. Re-run the embed script after refreshing articles.json.</div>';
    });
  } catch (err) {
    document.getElementById('articles').innerHTML =
      '<div class="empty">Error loading data: ' + err.message + '</div>';
  }
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('filter-group').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    render();
  }
});

document.getElementById('sort').addEventListener('change', e => {
  activeSort = e.target.value;
  render();
});

document.getElementById('show-status').addEventListener('click', e => {
  e.preventDefault();
  document.getElementById('feed-status').classList.toggle('open');
});

loadData();
</script>
</body>
</html>
